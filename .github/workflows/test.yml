name: Test

on:
  pull_request:
  push:
    branches: [main, refactor/tei-maker-pipeline]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Python checks
        run: |
          python -m compileall tei_maker tests
          python -m unittest discover -s tests
          python -m tei_maker --help
      - name: Check viewer JavaScript
        run: node --check viewer/app.js
